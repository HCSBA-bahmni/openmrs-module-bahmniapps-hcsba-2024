<div class="dashboard bmx-home">

  <!-- ── TOPBAR ──────────────────────────────────────────────── -->
  <header class="bmx-homebar">

    <!-- Brand (left) -->
    <div class="bmx-homebar__brand">
      <img class="bmx-homebar__logo" ng-src="{{homeLogo}}" ng-if="homeLogo" alt="Logo" />
      <span class="bmx-homebar__title">Sistema HIS HCSBA</span>
    </div>

    <!-- Controls (right) -->
    <div class="bmx-homebar__controls">

      <!-- Location selector -->
      <div class="bmx-homebar__location-wrap">
        <i class="fa fa-map-marker bmx-homebar__location-icon" aria-hidden="true"></i>
        <select class="bmx-homebar__location-select"
                ng-model="selectedLocationUuid"
                ng-change="onLocationChange()">
          <option ng-repeat="location in locations | orderBy:'display'"
                  ng-selected="isCurrentLocation(location)"
                  value="{{location.uuid}}">
            {{location.display | translate}}
          </option>
        </select>
        <i class="fa fa-chevron-down bmx-homebar__location-chevron" aria-hidden="true"></i>
      </div>

      <!-- User dropdown -->
      <div class="bmx-homebar__user" ng-class="{'bmx-homebar__user--open': userMenuOpen}">
        <button class="bmx-homebar__user-btn" ng-click="userMenuOpen = !userMenuOpen" type="button">
          <span class="bmx-homebar__user-avatar">
            <i class="fa fa-user" aria-hidden="true"></i>
          </span>
          <span class="bmx-homebar__user-name" ng-bind="currentUser.username"></span>
          <i class="fa fa-chevron-down bmx-homebar__user-chevron" aria-hidden="true"></i>
        </button>

        <!-- Transparent overlay to close on outside click -->
        <div class="bmx-homebar__user-overlay" ng-show="userMenuOpen" ng-click="userMenuOpen = false"></div>

        <!-- Dropdown panel -->
        <div class="bmx-homebar__user-dropdown" ng-show="userMenuOpen">
          <div class="bmx-homebar__user-info">
            <span class="bmx-homebar__user-info-avatar">
              <i class="fa fa-user-circle" aria-hidden="true"></i>
            </span>
            <div>
              <strong ng-bind="currentUser.username"></strong>
              <small ng-if="currentUser.currentLocation" ng-bind="currentUser.currentLocation | translate"></small>
            </div>
          </div>
          <div class="bmx-homebar__user-divider"></div>
          <ul class="bmx-homebar__user-menu">
            <li>
              <a class="bmx-homebar__user-menu-item" ng-click="changePassword(); userMenuOpen = false">
                <i class="fa fa-key" aria-hidden="true"></i>
                <span>{{'CHANGE_PASSWORD' | translate}}</span>
              </a>
            </li>
            <li>
              <a class="bmx-homebar__user-menu-item bmx-homebar__user-menu-item--danger" log-out>
                <i class="fa fa-power-off" aria-hidden="true"></i>
                <span>{{'HEADER_LABEL_LOGOUT_KEY' | translate}}</span>
              </a>
            </li>
          </ul>
        </div>
      </div>

    </div>
  </header>

  <!-- ── WELCOME BANNER ──────────────────────────────────────── -->
  <div class="bmx-home__welcome">
    <div class="bmx-home__welcome-inner">
      <div class="bmx-home__welcome-text">
        <h2 class="bmx-home__welcome-heading">
          Bienvenido, <span ng-bind="currentUser.username"></span> 👋
        </h2>
        <p class="bmx-home__welcome-sub" ng-if="currentUser.currentLocation">
          <i class="fa fa-map-marker" aria-hidden="true"></i>
          <span ng-bind="currentUser.currentLocation | translate"></span>
        </p>
      </div>

    </div>
  </div>

  <!-- ── APP TILES ────────────────────────────────────────────── -->
  <div class="apps bmx-home__tiles">
    <div class="bmx-home__section-header">
      <span class="bmx-home__section-title">
        <i class="fa fa-th-large" aria-hidden="true"></i>
        Módulos disponibles
      </span>
      <span class="bmx-home__section-count">{{appExtensions.length}}</span>
    </div>
    <ul class="grid justify-content-center gap-3 list-none p-0 m-0">
      <li class="col-12 sm:col-4 md:col-3 lg:col-3 xl:col-2"
          ng-repeat="extn in appExtensions">
        <a id="{{extn.id}}"
           ng-href="{{extn.url}}"
           class="button app big bmx-tile"
           target="{{extn.target?extn.target:'_self'}}"
           ng-if="isVisibleExtension(extn)">
          <span class="bmx-tile__icon-wrap">
            <i class="{{extn.icon}}" aria-hidden="true"></i>
          </span>
          <span class="bmx-tile__label">{{extn | titleTranslate}}</span>
        </a>
      </li>
    </ul>
  </div>

</div>
